name: shambadoc
description: AI-Powered Crop Disease Diagnosis App for Kenyan Smallholder Farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.3
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.3.1
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  google_maps_flutter: ^2.6.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  http: ^1.2.1
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/models/plant_disease.tflite
    - assets/models/labels.txt
    - assets/images/
    - assets/icons/
